name: Release & Publish

# Triggers when a version tag is pushed to main
# Requires: NPM_TOKEN secret set in repo settings
# Requires: CLI_REPO_TOKEN (PAT with repo access to meetsoma/cli)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run all test suites
        run: |
          PASS=0
          FAIL=0
          for t in tests/test-*.sh; do
            echo "=== $(basename $t) ==="
            if bash "$t" 2>&1; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "Suites: $PASS passed, $FAIL failed (of $((PASS + FAIL)))"
          [ $FAIL -eq 0 ] || exit 1

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: agent

      - uses: actions/checkout@v4
        with:
          repository: meetsoma/cli
          token: ${{ secrets.CLI_REPO_TOKEN }}
          path: cli

      # Enable when meetsoma/cli-pro repo exists
      # - uses: actions/checkout@v4
      #   with:
      #     repository: meetsoma/cli-pro
      #     token: ${{ secrets.CLI_REPO_TOKEN }}
      #     path: cli-pro

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing v$TAG"

      - name: Sync agent → CLI (full sync — core, extensions, docs, protocols, scripts)
        run: |
          AGENT_DIR="$GITHUB_WORKSPACE/agent" bash cli/scripts/sync-from-agent.sh
          echo "✓ Full sync complete"

      - name: Bump version in CLI packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in cli; do  # Add cli-pro when ready
            cd "$pkg"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd ..
          done
          echo "✓ Packages at v$VERSION"

      - name: Publish meetsoma
        working-directory: cli
        run: npm publish --access public --tag ${{ steps.version.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Enable when meetsoma/cli-pro repo exists
      # - name: Publish @gravicity.ai/soma (enterprise)
      #   working-directory: cli-pro
      #   run: npm publish --access public --tag ${{ steps.version.outputs.tag }}
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps back to CLI repos
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in cli; do  # Add cli-pro when ready
            cd "$pkg"
            git config user.name "meetsoma[bot]"
            git config user.email "meetsoma[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "No changes in $pkg"
            else
              git commit -m "release: v$VERSION — version bump + docs sync"
              git tag "v$VERSION"
              git push origin HEAD
              git push origin "v$VERSION"
              echo "✓ $pkg pushed v$VERSION"
            fi
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
