<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="logo-title2">
  <title id="logo-title2">Soma — The Breath</title>
  <defs>
    <linearGradient id="inhale" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="exhale" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b9ac4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8ddf0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Inhale — left lung/lobe, darker, drawing in -->
  <path d="M96,45 Q50,55 40,100 Q32,145 65,165 Q85,175 96,155 Z"
        fill="url(#inhale)" opacity="0.9"/>

  <!-- Exhale — right lung/lobe, lighter, releasing -->
  <path d="M104,45 Q150,55 160,100 Q168,145 135,165 Q115,175 104,155 Z"
        fill="url(#exhale)" opacity="0.9"/>

  <!-- The gap — the breath between sessions -->
  <line x1="100" y1="42" x2="100" y2="158" stroke="#1a1a2e" stroke-width="3" opacity="0.15"/>

  <!-- Connection point — where inhale meets exhale, identity forms -->
  <circle cx="100" cy="100" r="6" fill="#e8f0fb"/>
  <circle cx="100" cy="100" r="12" fill="none" stroke="#c8ddf0" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#6b9ac4" stroke-width="0.75" opacity="0.25"/>

  <!-- Top opening — the entry point -->
  <path d="M94,40 Q100,34 106,40" fill="none" stroke="#6b9ac4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>