<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Soma — The Growing Vessel</title>
  <defs>
    <linearGradient id="vessel-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#6b9ac4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d4e4f7;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Outer growth ring -->
  <ellipse cx="100" cy="108" rx="72" ry="68" fill="none" stroke="#4a6fa5" stroke-width="1.5" opacity="0.2"/>

  <!-- Middle growth ring -->
  <ellipse cx="100" cy="108" rx="56" ry="52" fill="none" stroke="#4a6fa5" stroke-width="1.5" opacity="0.35"/>

  <!-- Inner growth ring -->
  <ellipse cx="100" cy="108" rx="40" ry="37" fill="none" stroke="#6b9ac4" stroke-width="1.5" opacity="0.5"/>

  <!-- The vessel — open at the top, like a body waiting to be filled -->
  <path d="M60,70 Q60,160 100,165 Q140,160 140,70" fill="url(#vessel-grad)" stroke="none"/>

  <!-- Inner glow — the memory growing inside -->
  <path d="M72,78 Q72,148 100,152 Q128,148 128,78" fill="url(#glow)" stroke="none"/>

  <!-- Opening at top — breath entrance -->
  <path d="M56,72 Q78,62 100,65 Q122,62 144,72" fill="none" stroke="#6b9ac4" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Small pulse dot — the living core -->
  <circle cx="100" cy="120" r="5" fill="#d4e4f7" opacity="0.9"/>
  <circle cx="100" cy="120" r="9" fill="none" stroke="#d4e4f7" stroke-width="1" opacity="0.4"/>
</svg>