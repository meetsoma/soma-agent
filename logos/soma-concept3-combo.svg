<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-labelledby="combo-title3">
  <title id="combo-title3">Soma Logo — Sigma Combination Mark</title>
  <defs>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8ddf0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Mini sigma with growth rings -->
  <g transform="translate(10, 5)">
    <!-- Outer ring -->
    <circle cx="35" cy="35" r="32" fill="none" stroke="#4a6fa5" stroke-width="0.75" opacity="0.2" stroke-dasharray="3 5"/>
    <!-- Inner ring -->
    <circle cx="35" cy="35" r="24" fill="none" stroke="#6b9ac4" stroke-width="0.75" opacity="0.3"/>

    <!-- Sigma σ -->
    <path d="M50,26 Q44,18 35,18 Q24,18 19,28 Q14,38 19,48 Q24,58 35,58 Q44,58 48,52 Q52,46 48,40 Q44,34 35,34 Q29,34 26,38"
          fill="none" stroke="url(#s-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Sigma tail -->
    <path d="M50,26 L56,21" fill="none" stroke="#c8ddf0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Core dot -->
    <circle cx="35" cy="38" r="2" fill="#e8f0fb" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(90, 0)">
    <text x="0" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="300" letter-spacing="8" fill="#1a1a2e">
      soma
    </text>
  </g>
</svg>