<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-labelledby="combo-title2">
  <title id="combo-title2">Soma Logo — Breath Combination Mark</title>
  <defs>
    <linearGradient id="b-inhale" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="b-exhale" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b9ac4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8ddf0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Mini breath -->
  <g transform="translate(15, 8)">
    <!-- Inhale lobe -->
    <path d="M32,10 Q12,15 8,38 Q5,58 20,65 Q28,68 32,58 Z"
          fill="url(#b-inhale)" opacity="0.9"/>
    <!-- Exhale lobe -->
    <path d="M38,10 Q58,15 62,38 Q65,58 50,65 Q42,68 38,58 Z"
          fill="url(#b-exhale)" opacity="0.9"/>
    <!-- Center point -->
    <circle cx="35" cy="36" r="3" fill="#e8f0fb"/>
    <!-- Top opening -->
    <path d="M30,8 Q35,4 40,8" fill="none" stroke="#6b9ac4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(95, 0)">
    <text x="0" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="300" letter-spacing="8" fill="#1a1a2e">
      soma
    </text>
  </g>
</svg>