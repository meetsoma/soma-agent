<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="logo-title3">
  <title id="logo-title3">Soma — σ (Sigma) Growth</title>
  <defs>
    <linearGradient id="sigma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8ddf0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8f0fb;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Outermost memory ring — faintest, oldest memory -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.12"
          stroke-dasharray="4 8"/>

  <!-- Growth ring 2 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.2"
          stroke-dasharray="3 6"/>

  <!-- Growth ring 3 -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#6b9ac4" stroke-width="1.2" opacity="0.3"/>

  <!-- The σ (lowercase sigma) — the soul of Soma -->
  <!-- Stylized as a continuous flowing path, like a body forming -->
  <path d="M130,82 Q118,68 100,68 Q72,68 62,88 Q52,108 62,128 Q72,148 100,148 Q118,148 126,138 Q134,128 126,114 Q118,100 100,100 Q88,100 82,108"
        fill="none"
        stroke="url(#sigma-grad)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- The tail of sigma — extending outward, reaching for more -->
  <path d="M130,82 L142,72"
        fill="none"
        stroke="#c8ddf0"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- Living core — where identity lives -->
  <circle cx="100" cy="108" r="4" fill="#e8f0fb" opacity="0.9"/>

  <!-- Core glow -->
  <circle cx="100" cy="108" r="14" fill="url(#core-glow)"/>
</svg>