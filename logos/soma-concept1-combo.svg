<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-labelledby="combo-title1">
  <title id="combo-title1">Soma Logo — Vessel Combination Mark</title>
  <defs>
    <linearGradient id="v-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="v-glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#6b9ac4;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#d4e4f7;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Icon: Mini vessel -->
  <g transform="translate(10, 5)">
    <ellipse cx="35" cy="40" rx="28" ry="26" fill="none" stroke="#4a6fa5" stroke-width="1" opacity="0.2"/>
    <path d="M20,22 Q20,62 35,64 Q50,62 50,22" fill="url(#v-grad)"/>
    <path d="M25,26 Q25,57 35,59 Q45,57 45,26" fill="url(#v-glow)"/>
    <path d="M18,23 Q27,18 35,20 Q43,18 52,23" fill="none" stroke="#6b9ac4" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="35" cy="42" r="3" fill="#d4e4f7" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(85, 0)">
    <text x="0" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="300" letter-spacing="8" fill="#1a1a2e">
      soma
    </text>
  </g>
</svg>