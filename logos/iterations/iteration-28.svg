<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 1B: Eyes same size as 26 but positioned higher (more forehead).
       Moon positioned more to the side (3 o'clock) rather than top-right.
       Gives a "companion walking beside" feel vs "sitting on shoulder". -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6494be"/>
      <stop offset="50%" stop-color="#4e7ea6"/>
      <stop offset="100%" stop-color="#3a6890"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#78aed0"/>
      <stop offset="50%" stop-color="#6298be"/>
      <stop offset="100%" stop-color="#4c82a8"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5484aa"/>
      <stop offset="100%" stop-color="#3a6488"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#4e7ea0"/>
      <stop offset="100%" stop-color="#386a8a"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="264" cy="464" rx="120" ry="13" fill="url(#gshd)"/>
    <rect x="218" y="398" width="20" height="38" rx="10" fill="url(#leg)"/>
    <rect x="274" y="398" width="20" height="38" rx="10" fill="url(#leg)"/>
    <ellipse cx="228" cy="438" rx="16" ry="9" fill="#386a8a"/>
    <ellipse cx="284" cy="438" rx="16" ry="9" fill="#386a8a"/>
    <!-- Arms -->
    <ellipse cx="100" cy="270" rx="36" ry="32" fill="url(#arm)"/>
    <ellipse cx="412" cy="270" rx="36" ry="32" fill="url(#arm)"/>
    <!-- Body -->
    <circle cx="256" cy="270" r="148" fill="url(#body)"/>
    <circle cx="256" cy="270" r="148" fill="url(#spec)"/>
    <!-- Moon shadow — more to the right since moon is at 3 o'clock -->
    <ellipse cx="370" cy="248" rx="28" ry="34" fill="url(#moon-shd)" transform="rotate(5 370 248)"/>
    <!-- Eyes — higher on the face, more forehead -->
    <circle cx="222" cy="240" r="24" fill="white"/>
    <circle cx="222" cy="240" r="12" fill="#12202e"/>
    <circle cx="228" cy="234" r="5" fill="white"/>
    <circle cx="290" cy="238" r="24" fill="white"/>
    <circle cx="290" cy="238" r="12" fill="#12202e"/>
    <circle cx="296" cy="232" r="5" fill="white"/>
    <!-- Moon — to the side, same height as body center -->
    <circle cx="424" cy="226" r="48" fill="url(#moon-f)"/>
    <circle cx="424" cy="226" r="48" fill="url(#moon-spec)"/>
    <!-- Moon eyes -->
    <circle cx="414" cy="220" r="8" fill="white"/>
    <circle cx="414" cy="220" r="4" fill="#12202e"/>
    <circle cx="416" cy="218" r="1.8" fill="white"/>
    <circle cx="438" cy="218" r="8" fill="white"/>
    <circle cx="438" cy="218" r="4" fill="#12202e"/>
    <circle cx="440" cy="216" r="1.8" fill="white"/>
  </g>
</svg>