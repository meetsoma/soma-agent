<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 2B (from 27): Try slightly different body color — warmer blue.
       Eyes even bigger (30r). Moon overlapping planet edge slightly
       for more intimacy. Pupils centered (looking forward). -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.26"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="268" cy="462" rx="124" ry="14" fill="url(#gshd)"/>
    <rect x="212" y="396" width="22" height="40" rx="11" fill="url(#leg)"/>
    <rect x="278" y="396" width="22" height="40" rx="11" fill="url(#leg)"/>
    <ellipse cx="223" cy="438" rx="18" ry="10" fill="#3c6e8e"/>
    <ellipse cx="289" cy="438" rx="18" ry="10" fill="#3c6e8e"/>
    <circle cx="102" cy="272" r="36" fill="url(#arm)"/>
    <circle cx="410" cy="272" r="36" fill="url(#arm)"/>
    <circle cx="256" cy="268" r="150" fill="url(#body)"/>
    <circle cx="256" cy="268" r="150" fill="url(#spec)"/>
    <!-- Moon shadow -->
    <ellipse cx="344" cy="176" rx="32" ry="28" fill="url(#moon-shd)" transform="rotate(15 344 176)"/>
    <!-- Eyes — 30r, biggest yet -->
    <circle cx="216" cy="248" r="30" fill="white"/>
    <circle cx="216" cy="248" r="15" fill="#12202e"/>
    <circle cx="222" cy="241" r="6.5" fill="white"/>
    <circle cx="294" cy="246" r="30" fill="white"/>
    <circle cx="294" cy="246" r="15" fill="#12202e"/>
    <circle cx="300" cy="239" r="6.5" fill="white"/>
    <!-- Moon — overlapping planet edge -->
    <circle cx="376" cy="146" r="52" fill="url(#moon-f)"/>
    <circle cx="376" cy="146" r="52" fill="url(#moon-spec)"/>
    <!-- Moon eyes -->
    <circle cx="366" cy="140" r="10" fill="white"/>
    <circle cx="366" cy="140" r="5" fill="#12202e"/>
    <circle cx="368" cy="138" r="2.2" fill="white"/>
    <circle cx="392" cy="138" r="10" fill="white"/>
    <circle cx="392" cy="138" r="5" fill="#12202e"/>
    <circle cx="394" cy="136" r="2.2" fill="white"/>
  </g>
</svg>