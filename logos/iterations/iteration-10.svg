<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 10: Most minimal. No pots, growing from same soil patch.
       Mom is taller with a thicker stem that curves slightly.
       Big round head, one leaf-arm draping over baby.
       Baby is just barely out of the ground — tiny stem, tiny head.
       Strong silhouette. Works at 16px: tall shape + small shape + arc between. -->
  <defs>
    <style>
      .stem { stroke: #5a8a6e; fill: none; stroke-linecap: round; }
      .leaf { fill: #6aaa82; }
      .leaf-d { fill: #4a7a62; }
      .head { fill: #3e5575; }
      .head-b { fill: #4e6888; }
      .soil { fill: #6e5c4a; }
    </style>
  </defs>
  <g id="icon">
    <!-- Soil patch — shared ground -->
    <ellipse class="soil" cx="248" cy="456" rx="196" ry="32"/>

    <!-- === MOM === -->
    <!-- Stem — thick, gently curved -->
    <path class="stem" d="M176,432 Q170,350 174,260 Q178,200 180,160" stroke-width="20"/>

    <!-- Leaf left — resting -->
    <path class="leaf" d="M168,320 Q120,288 98,260 Q90,248 104,246 Q118,244 136,268 Q158,298 168,316"/>

    <!-- Leaf-arm right — THE PAT, big graceful arc -->
    <path class="leaf" d="M186,240 Q230,200 300,192 Q348,188 376,200"
          stroke="#6aaa82" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Leaf tip — flattens into a little hand/pad shape on baby's head -->
    <path class="leaf" d="M368,198 Q392,192 400,208 Q406,224 388,228 Q370,228 364,214 Z"/>

    <!-- Head — round -->
    <circle class="head" cx="178" cy="114" r="58"/>

    <!-- Crown leaves -->
    <path class="leaf" d="M178,56 Q166,28 174,8 Q178,24 184,14 Q192,32 178,56 Z"/>
    <path class="leaf-d" d="M136,72 Q114,52 116,36 Q126,48 134,42 Q140,58 138,72 Z"/>
    <path class="leaf-d" d="M220,72 Q242,52 240,36 Q230,48 222,42 Q216,58 218,72 Z"/>

    <!-- Eyes — warm, looking right -->
    <circle cx="158" cy="108" r="18" fill="#eaeff7"/>
    <circle cx="164" cy="105" r="11" fill="#7ba3c9"/>
    <circle cx="168" cy="101" r="4" fill="white"/>

    <circle cx="200" cy="106" r="18" fill="#eaeff7"/>
    <circle cx="206" cy="103" r="11" fill="#7ba3c9"/>
    <circle cx="210" cy="99" r="4" fill="white"/>

    <!-- Smile -->
    <path d="M166,136 Q180,150 196,136" fill="none" stroke="#7ba3c9" stroke-width="4" stroke-linecap="round"/>

    <!-- === BABY === -->
    <!-- Short stem -->
    <path class="stem" d="M380,432 Q378,400 379,360" stroke-width="12"/>

    <!-- Tiny leaves -->
    <path class="leaf" d="M373,400 Q356,388 350,376 Q348,370 356,372 Q364,376 372,394"/>
    <path class="leaf" d="M385,390 Q400,378 406,368 Q410,362 404,366 Q396,372 386,386"/>

    <!-- Baby head — small -->
    <circle class="head-b" cx="380" cy="320" r="38"/>

    <!-- Baby crown leaf -->
    <path class="leaf" d="M380,282 Q372,264 376,250 Q380,260 384,254 Q388,268 380,282 Z"/>

    <!-- Baby eyes — looking up-left -->
    <circle cx="366" cy="314" r="12" fill="#eaeff7"/>
    <circle cx="362" cy="311" r="7.5" fill="#7ba3c9"/>
    <circle cx="360" cy="308" r="2.8" fill="white"/>

    <circle cx="396" cy="312" r="12" fill="#eaeff7"/>
    <circle cx="392" cy="309" r="7.5" fill="#7ba3c9"/>
    <circle cx="390" cy="306" r="2.8" fill="white"/>

    <!-- Baby smile -->
    <path d="M372,338 Q382,347 394,338" fill="none" stroke="#8aaad0" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>