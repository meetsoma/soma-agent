<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="cell-main" cx="40%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#97aaca"/>
      <stop offset="35%" stop-color="#677da2"/>
      <stop offset="85%" stop-color="#384b68"/>
      <stop offset="100%" stop-color="#2c3c56"/>
    </radialGradient>
    <radialGradient id="cell-bud" cx="40%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#a4b5d0"/>
      <stop offset="35%" stop-color="#7588a8"/>
      <stop offset="85%" stop-color="#425670"/>
      <stop offset="100%" stop-color="#354560"/>
    </radialGradient>
    <radialGradient id="spec" cx="33%" cy="28%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spec-sm" cx="33%" cy="28%" r="28%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#8aaad0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8aaad0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="78%" cy="75%" r="28%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#97aaca" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2a40" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e2a40" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="264" cy="472" rx="150" ry="22" fill="url(#shadow)"/>

    <!-- Bridge BEHIND both cells — soft, just a hint of connection -->
    <ellipse cx="342" cy="196" rx="50" ry="34" transform="rotate(-42 342 196)" fill="#4c6484" opacity="0.45"/>

    <!-- Main cell -->
    <circle cx="232" cy="280" r="168" fill="url(#cell-main)"/>
    <circle cx="232" cy="280" r="168" fill="url(#inner-glow)"/>
    <circle cx="232" cy="280" r="168" fill="url(#spec)"/>
    <circle cx="232" cy="280" r="168" fill="url(#rim)"/>

    <!-- Daughter cell -->
    <circle cx="384" cy="136" r="84" fill="url(#cell-bud)"/>
    <circle cx="384" cy="136" r="84" fill="url(#spec-sm)"/>

    <!-- Main eye -->
    <circle cx="214" cy="260" r="46" fill="#eaeff7"/>
    <circle cx="223" cy="253" r="27" fill="#7ba3c9"/>
    <circle cx="232" cy="244" r="9" fill="white"/>

    <!-- Daughter eye -->
    <circle cx="382" cy="130" r="21" fill="#eaeff7"/>
    <circle cx="386" cy="127" r="12.5" fill="#7ba3c9"/>
    <circle cx="390" cy="123" r="4.5" fill="white"/>

    <!-- Smile -->
    <path d="M198,318 Q218,336 240,318" fill="none" stroke="#8aaad0" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>