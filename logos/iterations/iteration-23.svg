<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="body" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#5a82aa"/>
      <stop offset="100%" stop-color="#3a6088"/>
    </radialGradient>
    <radialGradient id="arm" cx="46%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4a7298"/>
      <stop offset="100%" stop-color="#345a7a"/>
    </radialGradient>
    <radialGradient id="moon" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#6e9abe"/>
      <stop offset="100%" stop-color="#4a7a9e"/>
    </radialGradient>
    <radialGradient id="leg" cx="50%" cy="36%" r="50%">
      <stop offset="0%" stop-color="#4a7298"/>
      <stop offset="100%" stop-color="#345a7a"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="256" cy="460" rx="128" ry="14" fill="url(#shadow)"/>

    <!-- Legs -->
    <rect x="218" y="396" width="20" height="38" rx="10" fill="url(#leg)"/>
    <rect x="274" y="396" width="20" height="38" rx="10" fill="url(#leg)"/>
    <ellipse cx="228" cy="436" rx="16" ry="9" fill="#345a7a"/>
    <ellipse cx="284" cy="436" rx="16" ry="9" fill="#345a7a"/>

    <!-- Arms -->
    <ellipse cx="104" cy="270" rx="38" ry="34" fill="url(#arm)"/>
    <ellipse cx="408" cy="270" rx="38" ry="34" fill="url(#arm)"/>

    <!-- Body — flatter gradient, less shadow -->
    <circle cx="256" cy="268" r="150" fill="url(#body)"/>

    <!-- Eyes — white with dark pupil -->
    <circle cx="220" cy="252" r="24" fill="white"/>
    <circle cx="220" cy="252" r="12" fill="#0c1620"/>
    <circle cx="225" cy="247" r="5" fill="white" opacity="0.95"/>

    <circle cx="292" cy="250" r="24" fill="white"/>
    <circle cx="292" cy="250" r="12" fill="#0c1620"/>
    <circle cx="297" cy="245" r="5" fill="white" opacity="0.95"/>

    <!-- Moon -->
    <circle cx="386" cy="144" r="46" fill="url(#moon)"/>

    <!-- Moon eyes — white -->
    <circle cx="376" cy="138" r="8" fill="white"/>
    <circle cx="376" cy="138" r="4" fill="#0c1620"/>
    <circle cx="378" cy="136" r="1.8" fill="white" opacity="0.9"/>

    <circle cx="400" cy="136" r="8" fill="white"/>
    <circle cx="400" cy="136" r="4" fill="#0c1620"/>
    <circle cx="402" cy="134" r="1.8" fill="white" opacity="0.9"/>
  </g>
</svg>