<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 5: Mother plant patting baby plant.
       Mother is a round bulb body with a face, rooted.
       One leaf-arm stretches right to rest on baby's head.
       Baby is a tiny sprout with a leaf or two, looking up.
       Soft blue-green palette. Spherical depth. -->
  <defs>
    <radialGradient id="mom-body" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7db5a0"/>
      <stop offset="45%" stop-color="#4a8b78"/>
      <stop offset="100%" stop-color="#2a5c4e"/>
    </radialGradient>
    <radialGradient id="baby-body" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#8fc4ae"/>
      <stop offset="45%" stop-color="#5a9d86"/>
      <stop offset="100%" stop-color="#357561"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="28%" r="26%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spec-sm" cx="32%" cy="28%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a30" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e3a30" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="256" cy="472" rx="200" ry="24" fill="url(#shadow)"/>

    <!-- Mother plant base/roots — little nub at bottom -->
    <ellipse cx="192" cy="440" rx="60" ry="20" fill="#2a5c4e"/>

    <!-- Baby plant base/roots -->
    <ellipse cx="376" cy="444" rx="32" ry="12" fill="#357561"/>

    <!-- Mother body — big round bulb -->
    <ellipse cx="192" cy="310" rx="130" ry="145" fill="url(#mom-body)"/>
    <ellipse cx="192" cy="310" rx="130" ry="145" fill="url(#spec)"/>

    <!-- Mother's left leaf (decorative, resting) -->
    <path d="M72,280 Q32,240 48,200 Q58,220 76,248 Q68,210 80,176 Q88,210 90,258"
          fill="#3d8c6e" opacity="0.8"/>

    <!-- Mother's right leaf-arm — reaching over to pat baby -->
    <path d="M290,240 Q340,210 370,200 Q390,195 396,208 Q400,220 384,226 Q360,234 340,252 Q320,270 300,260 Z"
          fill="#4a9a7c"/>
    <!-- Leaf vein -->
    <path d="M295,248 Q340,225 388,212" fill="none" stroke="#3d8c6e" stroke-width="2.5" opacity="0.5"/>

    <!-- Leaf tip resting on baby's head — the pat -->
    <ellipse cx="384" cy="218" rx="18" ry="12" transform="rotate(-15 384 218)" fill="#5aaa8a"/>

    <!-- Baby plant body — small round sprout -->
    <ellipse cx="376" cy="360" rx="64" ry="80" fill="url(#baby-body)"/>
    <ellipse cx="376" cy="360" rx="64" ry="80" fill="url(#spec-sm)"/>

    <!-- Baby's tiny leaf on top -->
    <path d="M376,282 Q362,260 368,244 Q376,258 380,248 Q386,264 376,282 Z" fill="#5aaa8a"/>

    <!-- Mother's head leaf/sprout -->
    <path d="M192,165 Q170,130 180,104 Q192,128 198,112 Q210,136 192,165 Z" fill="#4a9a7c"/>

    <!-- Mother face — eyes -->
    <circle cx="162" cy="290" r="24" fill="#e8f2ee"/>
    <circle cx="168" cy="286" r="14" fill="#4a8b78"/>
    <circle cx="174" cy="280" r="5" fill="white"/>

    <circle cx="228" cy="290" r="24" fill="#e8f2ee"/>
    <circle cx="234" cy="286" r="14" fill="#4a8b78"/>
    <circle cx="240" cy="280" r="5" fill="white"/>

    <!-- Mother smile — warm, looking at baby -->
    <path d="M172,336 Q195,354 218,336" fill="none" stroke="#5aaa8a" stroke-width="5" stroke-linecap="round"/>

    <!-- Baby face — looking up at mom -->
    <circle cx="362" cy="345" r="16" fill="#e8f2ee"/>
    <circle cx="366" cy="341" r="9.5" fill="#5a9d86"/>
    <circle cx="370" cy="337" r="3.5" fill="white"/>

    <circle cx="394" cy="345" r="16" fill="#e8f2ee"/>
    <circle cx="398" cy="341" r="9.5" fill="#5a9d86"/>
    <circle cx="402" cy="337" r="3.5" fill="white"/>

    <!-- Baby smile — happy, being patted -->
    <path d="M368,376 Q380,388 392,376" fill="none" stroke="#6ab89a" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>