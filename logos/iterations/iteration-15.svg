<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 15: No faces. Let the relationship speak.
       Planet large. Moon small and close — almost touching.
       A faint orbit line connects them. The closeness IS the tenderness.
       Cleaner, more logo-like. Relies on composition not expression. -->
  <defs>
    <radialGradient id="planet" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#9ab0cc"/>
      <stop offset="35%" stop-color="#6a82a6"/>
      <stop offset="85%" stop-color="#3a5070"/>
      <stop offset="100%" stop-color="#2e4260"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#b8c8de"/>
      <stop offset="35%" stop-color="#8ea4c0"/>
      <stop offset="100%" stop-color="#5a7494"/>
    </radialGradient>
    <radialGradient id="hi" cx="30%" cy="26%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-sm" cx="30%" cy="26%" r="28%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="76%" cy="74%" r="28%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9ab0cc" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#6a82a6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9ab0cc" stop-opacity="0.12"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Faint orbit path -->
    <circle cx="224" cy="268" r="210" fill="none" stroke="#6a82a6" stroke-width="1.5" opacity="0.15" stroke-dasharray="6 8"/>

    <!-- Atmosphere -->
    <circle cx="224" cy="268" r="180" fill="url(#atmo)"/>

    <!-- Planet -->
    <circle cx="224" cy="268" r="168" fill="url(#planet)"/>
    <circle cx="224" cy="268" r="168" fill="url(#hi)"/>
    <circle cx="224" cy="268" r="168" fill="url(#rim)"/>

    <!-- Surface details -->
    <circle cx="168" cy="328" r="30" fill="#3a5070" opacity="0.12"/>
    <circle cx="280" cy="230" r="20" fill="#3a5070" opacity="0.1"/>
    <circle cx="196" cy="380" r="16" fill="#3a5070" opacity="0.08"/>
    <circle cx="300" cy="310" r="12" fill="#3a5070" opacity="0.08"/>

    <!-- Moon — close, upper right -->
    <circle cx="400" cy="116" r="68" fill="url(#moon)"/>
    <circle cx="400" cy="116" r="68" fill="url(#hi-sm)"/>

    <!-- Moon surface -->
    <circle cx="384" cy="132" r="10" fill="#5a7494" opacity="0.12"/>
    <circle cx="416" cy="102" r="7" fill="#5a7494" opacity="0.1"/>
  </g>
</svg>