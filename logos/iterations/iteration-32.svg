<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 3B (from 29): Same warmer palette but moon BELOW planet
       (like a child hiding behind parent's leg). Eyes looking forward.
       Tests whether moon placement changes the whole feel. -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="268" cy="478" rx="130" ry="13" fill="url(#gshd)"/>
    <!-- Legs -->
    <rect x="212" y="392" width="24" height="36" rx="12" fill="url(#leg)"/>
    <rect x="276" y="392" width="24" height="36" rx="12" fill="url(#leg)"/>
    <ellipse cx="224" cy="430" rx="18" ry="10" fill="#3c6e8e"/>
    <ellipse cx="288" cy="430" rx="18" ry="10" fill="#3c6e8e"/>

    <!-- Moon — below-right, peeking from behind planet's "leg" area -->
    <circle cx="392" cy="388" r="48" fill="url(#moon-f)"/>
    <circle cx="392" cy="388" r="48" fill="url(#moon-spec)"/>
    <!-- Moon eyes — looking up at planet, shy -->
    <circle cx="382" cy="380" r="9" fill="white"/>
    <circle cx="380" cy="378" r="4.5" fill="#12202e"/>
    <circle cx="379" cy="376" r="2" fill="white"/>
    <circle cx="406" cy="378" r="9" fill="white"/>
    <circle cx="404" cy="376" r="4.5" fill="#12202e"/>
    <circle cx="403" cy="374" r="2" fill="white"/>

    <!-- Arms -->
    <circle cx="108" cy="260" r="34" fill="url(#arm)"/>
    <circle cx="404" cy="260" r="34" fill="url(#arm)"/>
    <!-- Body -->
    <circle cx="256" cy="256" r="148" fill="url(#body)"/>
    <circle cx="256" cy="256" r="148" fill="url(#spec)"/>
    <!-- Eyes — looking forward -->
    <circle cx="218" cy="238" r="28" fill="white"/>
    <circle cx="218" cy="238" r="14" fill="#12202e"/>
    <circle cx="224" cy="232" r="6" fill="white"/>
    <circle cx="294" cy="236" r="28" fill="white"/>
    <circle cx="294" cy="236" r="14" fill="#12202e"/>
    <circle cx="300" cy="230" r="6" fill="white"/>
  </g>
</svg>