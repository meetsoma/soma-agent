<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="cell-main" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6b7fa6"/>
      <stop offset="50%" stop-color="#3d4f6f"/>
      <stop offset="100%" stop-color="#252f45"/>
    </radialGradient>
    <radialGradient id="cell-bud" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7b8db5"/>
      <stop offset="50%" stop-color="#4a5e80"/>
      <stop offset="100%" stop-color="#2d3a54"/>
    </radialGradient>
    <radialGradient id="sheen" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen-sm" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Bridge BEHIND both cells — just a soft connector -->
    <ellipse cx="338" cy="198" rx="56" ry="42" transform="rotate(-40 338 198)" fill="#3d4f6f" opacity="0.6"/>

    <!-- Main cell body -->
    <circle cx="232" cy="280" r="164" fill="url(#cell-main)"/>
    <circle cx="232" cy="280" r="164" fill="url(#sheen)"/>

    <!-- Daughter cell -->
    <circle cx="372" cy="138" r="92" fill="url(#cell-bud)"/>
    <circle cx="372" cy="138" r="92" fill="url(#sheen-sm)"/>

    <!-- Main eye -->
    <circle cx="214" cy="260" r="44" fill="#e8edf5"/>
    <circle cx="222" cy="254" r="26" fill="#7ba3c9"/>
    <circle cx="232" cy="244" r="9" fill="white" opacity="0.95"/>

    <!-- Daughter eye -->
    <circle cx="370" cy="130" r="22" fill="#e8edf5"/>
    <circle cx="374" cy="127" r="13" fill="#7ba3c9"/>
    <circle cx="378" cy="123" r="5" fill="white" opacity="0.9"/>

    <!-- Smile -->
    <path d="M198,316 Q218,334 240,316" fill="none" stroke="#7ba3c9" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>