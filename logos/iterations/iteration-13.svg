<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 13: Back in the blue palette — but plant-shaped.
       A blue-toned plant (Soma's color identity) instead of green.
       More stylized, slightly more logo-like. Thicker shapes. -->
  <defs>
    <style>
      .stem { fill: #5a7a9e; }
      .leaf { fill: #6a9abe; }
      .leaf-dk { fill: #4a7094; }
      .soil { fill: #6e5c4a; }
    </style>
  </defs>
  <g id="icon">
    <!-- Soil -->
    <ellipse class="soil" cx="256" cy="458" rx="210" ry="34"/>

    <!-- === MOM === -->
    <!-- Stem -->
    <path d="M170,426 Q164,340 166,250 Q168,190 170,148"
          fill="none" stroke="#5a7a9e" stroke-width="20" stroke-linecap="round"/>

    <!-- Lower leaf pair -->
    <path class="leaf" d="M158,348 Q108,314 82,270 Q72,252 92,254 Q112,260 142,302 Q158,334 158,346"/>
    <path class="leaf" d="M178,340 Q220,310 248,272 Q256,256 240,256 Q224,262 200,296 Q180,326 178,338"/>

    <!-- Upper leaf pair -->
    <path class="leaf-dk" d="M162,246 Q124,218 104,182 Q96,168 114,170 Q130,176 152,210 Q162,236 162,244"/>
    <path class="leaf" d="M176,240 Q208,216 226,184 Q232,170 220,170 Q206,176 190,206 Q178,230 176,238"/>

    <!-- Crown leaves -->
    <path class="leaf" d="M164,168 Q140,130 138,92 Q136,74 152,84 Q162,94 164,140 Q166,158 164,166"/>
    <path class="leaf" d="M174,164 Q196,130 200,94 Q202,76 190,84 Q180,94 176,138 Q174,156 174,162"/>

    <!-- PAT LEAF — bold arc to baby -->
    <path class="leaf" d="M178,210 Q236,168 316,156 Q360,152 386,164 Q404,172 398,190 Q390,206 370,198 Q342,188 302,194 Q248,210 206,236"/>

    <!-- Leaf tip on baby -->
    <path class="leaf" d="M388,174 Q406,168 410,186 Q412,202 396,204 Q380,200 384,184 Z"/>

    <!-- === BABY === -->
    <path d="M386,426 Q384,398 385,364"
          fill="none" stroke="#5a7a9e" stroke-width="14" stroke-linecap="round"/>

    <!-- Cotyledons — round -->
    <path class="leaf" d="M379,372 Q354,348 344,322 Q340,308 356,314 Q368,322 378,356 Q379,366 379,370"/>
    <path class="leaf" d="M391,368 Q414,346 426,322 Q430,308 416,312 Q404,320 394,354 Q392,364 391,366"/>
  </g>
</svg>