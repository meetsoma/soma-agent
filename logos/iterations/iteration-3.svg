<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="cell-main" cx="42%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#a3b1d4"/>
      <stop offset="40%" stop-color="#6e82aa"/>
      <stop offset="100%" stop-color="#3b4d6e"/>
    </radialGradient>
    <radialGradient id="cell-bud" cx="42%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#b0bdd8"/>
      <stop offset="40%" stop-color="#7d8fb2"/>
      <stop offset="100%" stop-color="#455874"/>
    </radialGradient>
    <radialGradient id="soft-hi" cx="34%" cy="30%" r="32%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="catch" cx="28%" cy="24%" r="8%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="soft-hi-sm" cx="34%" cy="30%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3450" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2a3450" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="260" cy="468" rx="140" ry="20" fill="url(#shadow)"/>

    <!-- Bridge behind both cells -->
    <ellipse cx="348" cy="194" rx="48" ry="32" transform="rotate(-45 348 194)" fill="#5e7496" opacity="0.5"/>

    <!-- Main cell -->
    <circle cx="236" cy="280" r="168" fill="url(#cell-main)"/>
    <circle cx="236" cy="280" r="168" fill="url(#soft-hi)"/>
    <circle cx="236" cy="280" r="168" fill="url(#catch)"/>

    <!-- Daughter cell -->
    <circle cx="388" cy="132" r="76" fill="url(#cell-bud)"/>
    <circle cx="388" cy="132" r="76" fill="url(#soft-hi-sm)"/>

    <!-- Main eye -->
    <circle cx="216" cy="258" r="48" fill="#edf0f7"/>
    <circle cx="226" cy="251" r="28" fill="#7ba3c9"/>
    <circle cx="236" cy="241" r="10" fill="white"/>

    <!-- Daughter eye -->
    <circle cx="386" cy="126" r="20" fill="#edf0f7"/>
    <circle cx="390" cy="123" r="12" fill="#7ba3c9"/>
    <circle cx="394" cy="119" r="4.5" fill="white"/>

    <!-- Smile -->
    <path d="M200,320 Q222,338 244,320" fill="none" stroke="#7ba3c9" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>