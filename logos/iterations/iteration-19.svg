<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 19: Planet mascot with antennae instead of ring.
       Two small antennae on top — like the lobster, but these are
       little orbital arcs with moons at the tips.
       The mascot IS a planet that has tiny moons orbiting its head.
       That's the Soma signature: a body with orbiting children. -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="36%">
      <stop offset="0%" stop-color="#4a6a8e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0e1520" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#5a7ea6"/>
      <stop offset="45%" stop-color="#3e5e82"/>
      <stop offset="100%" stop-color="#2a4264"/>
    </radialGradient>
    <radialGradient id="moon-g" cx="42%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#8aaccc"/>
      <stop offset="100%" stop-color="#4a7296"/>
    </radialGradient>
    <radialGradient id="eye-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8cf0d0"/>
      <stop offset="60%" stop-color="#5ad4b0"/>
      <stop offset="100%" stop-color="#3ab090"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#0e1520"/>
  <circle cx="256" cy="272" r="240" fill="url(#bg-glow)"/>

  <g id="icon">
    <!-- Legs -->
    <rect x="216" y="400" width="18" height="34" rx="9" fill="#2a4264"/>
    <rect x="278" y="400" width="18" height="34" rx="9" fill="#2a4264"/>
    <ellipse cx="225" cy="436" rx="15" ry="8" fill="#2a4264"/>
    <ellipse cx="287" cy="436" rx="15" ry="8" fill="#2a4264"/>

    <!-- Antennae — thin arcs with little moons at tips -->
    <!-- Left antenna -->
    <path d="M220,140 Q200,90 178,68" fill="none" stroke="#3a5a7e" stroke-width="5" stroke-linecap="round"/>
    <circle cx="174" cy="64" r="14" fill="url(#moon-g)"/>

    <!-- Right antenna -->
    <path d="M292,140 Q312,86 338,66" fill="none" stroke="#3a5a7e" stroke-width="5" stroke-linecap="round"/>
    <circle cx="342" cy="62" r="14" fill="url(#moon-g)"/>

    <!-- Bump arms -->
    <ellipse cx="108" cy="278" rx="34" ry="30" fill="#2a4264"/>
    <ellipse cx="404" cy="278" rx="34" ry="30" fill="#2a4264"/>

    <!-- Body -->
    <circle cx="256" cy="272" r="144" fill="url(#body)"/>
    <circle cx="224" cy="230" r="52" fill="white" opacity="0.06"/>

    <!-- Craters -->
    <circle cx="204" cy="332" r="18" fill="#2a4264" opacity="0.2"/>
    <circle cx="310" cy="348" r="11" fill="#2a4264" opacity="0.16"/>

    <!-- Eyes -->
    <circle cx="222" cy="256" r="24" fill="url(#eye-glow)"/>
    <circle cx="222" cy="256" r="12" fill="#0e1520"/>
    <circle cx="226" cy="251" r="5" fill="white" opacity="0.9"/>

    <circle cx="290" cy="254" r="24" fill="url(#eye-glow)"/>
    <circle cx="290" cy="254" r="12" fill="#0e1520"/>
    <circle cx="294" cy="249" r="5" fill="white" opacity="0.9"/>
  </g>
</svg>