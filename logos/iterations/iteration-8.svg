<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 8: Actual plant characters.
       Mom: a stem growing from soil, with a round flower/head at top that has a face.
       A couple leaves on the stem. One leaf stretches right to pat baby.
       Baby: a tiny sprout just poking out of the soil, small round head, looking up.
       Shared soil/ground line connects them. -->
  <defs>
    <style>
      .stem { fill: #5a8a6e; }
      .leaf { fill: #6aaa82; }
      .leaf-dark { fill: #4a7a62; }
      .head { fill: #3a5070; }
      .head-light { fill: #4a6a8e; }
      .soil { fill: #5c4a3a; }
      .soil-light { fill: #6e5c4a; }
      .eye-w { fill: #eaeff7; }
      .iris { fill: #7ba3c9; }
    </style>
  </defs>
  <g id="icon">
    <!-- Soil mound -->
    <path class="soil" d="M16,440 Q16,400 80,392 Q180,380 256,386 Q332,380 432,392 Q496,400 496,440 L496,480 L16,480 Z"/>
    <path class="soil-light" d="M40,440 Q120,420 256,424 Q392,420 472,440 L472,446 Q392,428 256,432 Q120,428 40,446 Z" opacity="0.3"/>

    <!-- === MOTHER PLANT === -->
    <!-- Main stem -->
    <path class="stem" d="M164,386 Q158,320 162,240 Q164,200 168,170" stroke="none"/>
    <rect class="stem" x="154" y="170" width="20" height="220" rx="10"/>

    <!-- Left leaf on stem -->
    <path class="leaf" d="M154,300 Q110,278 88,256 Q78,246 90,240 Q102,234 118,252 Q140,276 154,296"/>
    <path d="M150,296 Q118,262 94,244" fill="none" stroke="#4a7a62" stroke-width="1.5" opacity="0.4"/>

    <!-- Right leaf-arm — THE PAT — stretches to baby -->
    <path class="leaf" d="M174,260 Q220,232 280,222 Q320,216 348,224 Q362,228 358,242 Q354,254 338,250 Q310,244 280,254 Q240,268 200,278"/>
    <path d="M178,266 Q240,238 340,234" fill="none" stroke="#4a7a62" stroke-width="1.5" opacity="0.4"/>
    <!-- Leaf tip drooping down onto baby -->
    <path class="leaf" d="M348,232 Q368,226 374,240 Q378,254 362,256 Q346,254 348,238 Z"/>

    <!-- Mother's head — round flower-face -->
    <circle class="head" cx="164" cy="130" r="64"/>
    <!-- Subtle highlight -->
    <circle cx="164" cy="130" r="64" fill="white" opacity="0.08"/>

    <!-- Small petals/leaves around head -->
    <ellipse class="leaf" cx="116" cy="104" rx="22" ry="12" transform="rotate(-30 116 104)"/>
    <ellipse class="leaf" cx="212" cy="104" rx="22" ry="12" transform="rotate(30 212 104)"/>
    <ellipse class="leaf" cx="164" cy="68" rx="12" ry="20" />

    <!-- Mom eyes — looking right -->
    <circle class="eye-w" cx="144" cy="122" r="18"/>
    <circle class="iris" cx="150" cy="119" r="11"/>
    <circle cx="154" cy="115" r="4" fill="white"/>

    <circle class="eye-w" cx="186" cy="120" r="18"/>
    <circle class="iris" cx="192" cy="117" r="11"/>
    <circle cx="196" cy="113" r="4" fill="white"/>

    <!-- Mom smile -->
    <path d="M148,152 Q164,166 182,152" fill="none" stroke="#7ba3c9" stroke-width="4" stroke-linecap="round"/>

    <!-- === BABY SPROUT === -->
    <!-- Baby stem — short, just poking out -->
    <rect class="stem" x="360" y="340" width="14" height="50" rx="7"/>

    <!-- Baby's tiny leaves on stem -->
    <path class="leaf" d="M360,365 Q344,356 338,344 Q336,338 344,338 Q352,338 358,350 Q360,358 360,364"/>
    <path class="leaf" d="M374,358 Q388,348 396,338 Q398,332 392,334 Q384,336 376,348 Q374,354 374,358"/>

    <!-- Baby head — smaller round -->
    <circle class="head-light" cx="367" cy="308" r="40"/>
    <circle cx="367" cy="308" r="40" fill="white" opacity="0.08"/>

    <!-- Baby tiny leaf on top -->
    <ellipse class="leaf" cx="367" cy="270" rx="10" ry="16"/>

    <!-- Baby eyes — big, looking up-left at mom -->
    <circle class="eye-w" cx="353" cy="302" r="13"/>
    <circle class="iris" cx="350" cy="299" r="8"/>
    <circle cx="348" cy="296" r="3" fill="white"/>

    <circle class="eye-w" cx="383" cy="300" r="13"/>
    <circle class="iris" cx="380" cy="297" r="8"/>
    <circle cx="378" cy="294" r="3" fill="white"/>

    <!-- Baby smile -->
    <path d="M358,322 Q368,332 380,322" fill="none" stroke="#8aaad0" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Baby blush -->
    <ellipse cx="345" cy="316" rx="10" ry="5" fill="#7ba3c9" opacity="0.15"/>
    <ellipse cx="391" cy="314" rx="10" ry="5" fill="#7ba3c9" opacity="0.15"/>
  </g>
</svg>