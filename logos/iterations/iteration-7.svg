<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 7: Cleaner, more iconic version.
       Mom is very round — almost a ball with a sprout.
       The leaf-arm arcs gracefully from mom's side down onto baby's head.
       Baby is tiltning head into the pat — cute body language.
       Fewer details, stronger silhouette for favicon.
       Blue palette, spherical shading. -->
  <defs>
    <radialGradient id="mom" cx="40%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#9ab0cc"/>
      <stop offset="40%" stop-color="#6a82a6"/>
      <stop offset="100%" stop-color="#3a5070"/>
    </radialGradient>
    <radialGradient id="baby" cx="40%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#a8bbd4"/>
      <stop offset="40%" stop-color="#7c92b2"/>
      <stop offset="100%" stop-color="#4a6280"/>
    </radialGradient>
    <radialGradient id="hi" cx="33%" cy="28%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-sm" cx="33%" cy="28%" r="28%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2a40" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e2a40" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="248" cy="478" rx="180" ry="20" fill="url(#shd)"/>

    <!-- Mom body — very round -->
    <circle cx="188" cy="296" r="152" fill="url(#mom)"/>
    <circle cx="188" cy="296" r="152" fill="url(#hi)"/>

    <!-- Mom sprout on top -->
    <path d="M188,144 Q168,108 176,78 Q188,100 194,86 Q206,112 188,144 Z" fill="#6a8aae"/>
    <!-- Second tiny leaf -->
    <path d="M196,148 Q214,120 228,112 Q218,132 204,148 Z" fill="#5a7a9e" opacity="0.7"/>

    <!-- Leaf-arm — arcs from mom's right side, curves down to rest on baby's head -->
    <path d="M308,244 Q350,216 378,224 Q404,232 400,252 Q396,264 376,262 Q356,260 340,276"
          fill="#5a7a9e"/>
    <!-- The pat contact — leaf tip sitting on baby -->
    <ellipse cx="382" cy="256" rx="20" ry="12" transform="rotate(10 382 256)" fill="#6a8aae"/>

    <!-- Baby body — round, slightly tilted into the pat -->
    <ellipse cx="380" cy="364" rx="72" ry="88" fill="url(#baby)" transform="rotate(-5 380 364)"/>
    <ellipse cx="380" cy="364" rx="72" ry="88" fill="url(#hi-sm)" transform="rotate(-5 380 364)"/>

    <!-- Baby sprout — tiny, just starting -->
    <path d="M374,276 Q366,258 370,244 Q374,254 378,248 Q382,260 374,276 Z" fill="#7c9ab8"/>

    <!-- Mom eyes — soft, looking right -->
    <circle cx="162" cy="278" r="26" fill="#eaeff7"/>
    <circle cx="170" cy="274" r="16" fill="#7ba3c9"/>
    <circle cx="176" cy="268" r="5.5" fill="white"/>

    <circle cx="222" cy="276" r="26" fill="#eaeff7"/>
    <circle cx="230" cy="272" r="16" fill="#7ba3c9"/>
    <circle cx="236" cy="266" r="5.5" fill="white"/>

    <!-- Mom smile — gentle, content -->
    <path d="M170,328 Q192,348 216,328" fill="none" stroke="#7ba3c9" stroke-width="5" stroke-linecap="round"/>

    <!-- Baby eyes — big relative to face, looking up with slight tilt -->
    <circle cx="362" cy="348" r="18" fill="#eaeff7"/>
    <circle cx="366" cy="344" r="11" fill="#7ba3c9"/>
    <circle cx="370" cy="339" r="4" fill="white"/>

    <circle cx="400" cy="346" r="18" fill="#eaeff7"/>
    <circle cx="404" cy="342" r="11" fill="#7ba3c9"/>
    <circle cx="408" cy="337" r="4" fill="white"/>

    <!-- Baby smile — happy squish -->
    <path d="M370,380 Q382,392 396,380" fill="none" stroke="#8aaad0" stroke-width="4" stroke-linecap="round"/>

    <!-- Baby blush — being patted! -->
    <ellipse cx="354" cy="370" rx="14" ry="6" fill="#7ba3c9" opacity="0.2"/>
    <ellipse cx="408" cy="368" rx="14" ry="6" fill="#7ba3c9" opacity="0.2"/>
  </g>
</svg>