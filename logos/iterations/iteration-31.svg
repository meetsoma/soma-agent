<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 3A (from 29): Take 29's gaze + borrow 30's warmer palette.
       Slightly thicker legs for better grounding. Moon eyes also
       looking back at planet (mutual gaze). -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.26"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="268" cy="478" rx="118" ry="12" fill="url(#gshd)"/>
    <!-- Thicker legs -->
    <rect x="212" y="412" width="24" height="36" rx="12" fill="url(#leg)"/>
    <rect x="276" y="412" width="24" height="36" rx="12" fill="url(#leg)"/>
    <ellipse cx="224" cy="450" rx="18" ry="10" fill="#3c6e8e"/>
    <ellipse cx="288" cy="450" rx="18" ry="10" fill="#3c6e8e"/>
    <!-- Arms from 27 size -->
    <circle cx="108" cy="280" r="34" fill="url(#arm)"/>
    <circle cx="404" cy="280" r="34" fill="url(#arm)"/>
    <!-- Body -->
    <circle cx="256" cy="276" r="148" fill="url(#body)"/>
    <circle cx="256" cy="276" r="148" fill="url(#spec)"/>
    <!-- Moon shadow -->
    <ellipse cx="348" cy="186" rx="30" ry="26" fill="url(#moon-shd)" transform="rotate(15 348 186)"/>
    <!-- Planet eyes — looking toward moon (pupils shifted right+up) -->
    <circle cx="218" cy="258" r="28" fill="white"/>
    <circle cx="224" cy="254" r="14" fill="#12202e"/>
    <circle cx="230" cy="248" r="6" fill="white"/>
    <circle cx="294" cy="256" r="28" fill="white"/>
    <circle cx="300" cy="252" r="14" fill="#12202e"/>
    <circle cx="306" cy="246" r="6" fill="white"/>
    <!-- Moon -->
    <circle cx="382" cy="152" r="50" fill="url(#moon-f)"/>
    <circle cx="382" cy="152" r="50" fill="url(#moon-spec)"/>
    <!-- Moon eyes — looking DOWN-LEFT at planet (mutual gaze) -->
    <circle cx="370" cy="148" r="9" fill="white"/>
    <circle cx="367" cy="150" r="4.5" fill="#12202e"/>
    <circle cx="366" cy="148" r="2" fill="white"/>
    <circle cx="394" cy="146" r="9" fill="white"/>
    <circle cx="391" cy="148" r="4.5" fill="#12202e"/>
    <circle cx="390" cy="146" r="2" fill="white"/>
  </g>
</svg>