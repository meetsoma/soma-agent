<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 1A: Bigger eyes (more expressive), moon slightly larger and closer.
       Arms rounder. Feet more defined. -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6494be"/>
      <stop offset="50%" stop-color="#4e7ea6"/>
      <stop offset="100%" stop-color="#3a6890"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#78aed0"/>
      <stop offset="50%" stop-color="#6298be"/>
      <stop offset="100%" stop-color="#4c82a8"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5484aa"/>
      <stop offset="100%" stop-color="#3a6488"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#4e7ea0"/>
      <stop offset="100%" stop-color="#386a8a"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="268" cy="462" rx="124" ry="14" fill="url(#gshd)"/>
    <!-- Legs — slightly wider stance -->
    <rect x="212" y="396" width="22" height="40" rx="11" fill="url(#leg)"/>
    <rect x="278" y="396" width="22" height="40" rx="11" fill="url(#leg)"/>
    <ellipse cx="223" cy="438" rx="18" ry="10" fill="#386a8a"/>
    <ellipse cx="289" cy="438" rx="18" ry="10" fill="#386a8a"/>
    <!-- Arms — rounder -->
    <circle cx="102" cy="272" r="36" fill="url(#arm)"/>
    <circle cx="410" cy="272" r="36" fill="url(#arm)"/>
    <!-- Body -->
    <circle cx="256" cy="268" r="150" fill="url(#body)"/>
    <circle cx="256" cy="268" r="150" fill="url(#spec)"/>
    <!-- Moon shadow on planet -->
    <ellipse cx="346" cy="180" rx="30" ry="26" fill="url(#moon-shd)" transform="rotate(15 346 180)"/>
    <!-- Eyes — BIGGER, 28r instead of 24 -->
    <circle cx="216" cy="250" r="28" fill="white"/>
    <circle cx="216" cy="250" r="14" fill="#12202e"/>
    <circle cx="222" cy="243" r="6" fill="white"/>
    <circle cx="292" cy="248" r="28" fill="white"/>
    <circle cx="292" cy="248" r="14" fill="#12202e"/>
    <circle cx="298" cy="241" r="6" fill="white"/>
    <!-- Moon — slightly larger (50r) and closer -->
    <circle cx="380" cy="148" r="50" fill="url(#moon-f)"/>
    <circle cx="380" cy="148" r="50" fill="url(#moon-spec)"/>
    <!-- Moon eyes -->
    <circle cx="370" cy="142" r="9" fill="white"/>
    <circle cx="370" cy="142" r="4.5" fill="#12202e"/>
    <circle cx="372" cy="140" r="2" fill="white"/>
    <circle cx="394" cy="140" r="9" fill="white"/>
    <circle cx="394" cy="140" r="4.5" fill="#12202e"/>
    <circle cx="396" cy="138" r="2" fill="white"/>
  </g>
</svg>