<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 4B: Planet fills more of the viewbox (154r). Moon smaller (44r)
       and higher — more like a tiny orbiting satellite.
       No smile. Arms slightly higher (mid-body). More confident pose.
       Tests: does a size contrast between parent/child feel better? -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="262" cy="484" rx="122" ry="12" fill="url(#gshd)"/>
    <rect x="214" y="418" width="24" height="36" rx="12" fill="url(#leg)"/>
    <rect x="276" y="418" width="24" height="36" rx="12" fill="url(#leg)"/>
    <ellipse cx="226" cy="456" rx="18" ry="10" fill="#3c6e8e"/>
    <ellipse cx="288" cy="456" rx="18" ry="10" fill="#3c6e8e"/>
    <!-- Arms higher — mid-body -->
    <circle cx="98" cy="270" r="34" fill="url(#arm)"/>
    <circle cx="414" cy="270" r="34" fill="url(#arm)"/>
    <!-- Bigger body -->
    <circle cx="256" cy="280" r="154" fill="url(#body)"/>
    <circle cx="256" cy="280" r="154" fill="url(#spec)"/>
    <!-- Moon shadow -->
    <ellipse cx="360" cy="170" rx="26" ry="22" fill="url(#moon-shd)" transform="rotate(15 360 170)"/>
    <!-- Eyes — looking toward moon -->
    <circle cx="218" cy="260" r="28" fill="white"/>
    <circle cx="224" cy="256" r="14" fill="#12202e"/>
    <circle cx="230" cy="250" r="6" fill="white"/>
    <circle cx="294" cy="258" r="28" fill="white"/>
    <circle cx="300" cy="254" r="14" fill="#12202e"/>
    <circle cx="306" cy="248" r="6" fill="white"/>
    <!-- Moon — smaller, higher -->
    <circle cx="392" cy="132" r="44" fill="url(#moon-f)"/>
    <circle cx="392" cy="132" r="44" fill="url(#moon-spec)"/>
    <!-- Moon eyes — looking at planet -->
    <circle cx="382" cy="126" r="8" fill="white"/>
    <circle cx="380" cy="128" r="4" fill="#12202e"/>
    <circle cx="379" cy="126" r="1.8" fill="white"/>
    <circle cx="404" cy="124" r="8" fill="white"/>
    <circle cx="402" cy="126" r="4" fill="#12202e"/>
    <circle cx="401" cy="124" r="1.8" fill="white"/>
  </g>
</svg>