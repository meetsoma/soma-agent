<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 20: Refined #18. No background.
       Better sphere shading, refined eye glow, ground shadow.
       Cleaner proportions. -->
  <defs>
    <radialGradient id="body" cx="40%" cy="34%" r="52%">
      <stop offset="0%" stop-color="#6088b0"/>
      <stop offset="40%" stop-color="#44648a"/>
      <stop offset="80%" stop-color="#2e4a6c"/>
      <stop offset="100%" stop-color="#243e5c"/>
    </radialGradient>
    <radialGradient id="body-hi" cx="30%" cy="26%" r="22%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body-rim" cx="78%" cy="76%" r="26%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6088b0" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="arm-l" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#4e7296"/>
      <stop offset="100%" stop-color="#283e58"/>
    </radialGradient>
    <radialGradient id="arm-r" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#4e7296"/>
      <stop offset="100%" stop-color="#283e58"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="34%" r="52%">
      <stop offset="0%" stop-color="#82a6c8"/>
      <stop offset="40%" stop-color="#6088aa"/>
      <stop offset="100%" stop-color="#3e6488"/>
    </radialGradient>
    <radialGradient id="moon-hi" cx="32%" cy="28%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye-glow-l" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#a0f4dc"/>
      <stop offset="40%" stop-color="#60dab8"/>
      <stop offset="100%" stop-color="#3cb89a"/>
    </radialGradient>
    <radialGradient id="eye-glow-r" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#a0f4dc"/>
      <stop offset="40%" stop-color="#60dab8"/>
      <stop offset="100%" stop-color="#3cb89a"/>
    </radialGradient>
    <!-- Eye outer glow (ambient) -->
    <radialGradient id="eye-ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60dab8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#60dab8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leg" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#3a5a7a"/>
      <stop offset="100%" stop-color="#243e5c"/>
    </radialGradient>
    <!-- Ground shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="256" cy="456" rx="140" ry="18" fill="url(#shadow)"/>

    <!-- Legs -->
    <rect x="216" y="394" width="20" height="38" rx="10" fill="url(#leg)"/>
    <rect x="276" y="394" width="20" height="38" rx="10" fill="url(#leg)"/>
    <ellipse cx="226" cy="434" rx="17" ry="10" fill="#283e58"/>
    <ellipse cx="286" cy="434" rx="17" ry="10" fill="#283e58"/>

    <!-- Bump arms -->
    <ellipse cx="108" cy="276" rx="36" ry="32" fill="url(#arm-l)"/>
    <ellipse cx="404" cy="276" rx="36" ry="32" fill="url(#arm-r)"/>

    <!-- Body -->
    <circle cx="256" cy="268" r="148" fill="url(#body)"/>
    <circle cx="256" cy="268" r="148" fill="url(#body-hi)"/>
    <circle cx="256" cy="268" r="148" fill="url(#body-rim)"/>

    <!-- Surface craters — very subtle -->
    <circle cx="198" cy="330" r="18" fill="#243e5c" opacity="0.2"/>
    <circle cx="312" cy="348" r="12" fill="#243e5c" opacity="0.16"/>
    <circle cx="178" cy="364" r="8" fill="#243e5c" opacity="0.12"/>

    <!-- Eye ambient glow -->
    <circle cx="222" cy="252" r="36" fill="url(#eye-ambient)"/>
    <circle cx="290" cy="250" r="36" fill="url(#eye-ambient)"/>

    <!-- Eyes -->
    <circle cx="222" cy="252" r="22" fill="url(#eye-glow-l)"/>
    <circle cx="222" cy="252" r="11" fill="#0e1822"/>
    <circle cx="226" cy="247" r="4.5" fill="white" opacity="0.95"/>
    <circle cx="218" cy="256" r="2" fill="white" opacity="0.3"/>

    <circle cx="290" cy="250" r="22" fill="url(#eye-glow-r)"/>
    <circle cx="290" cy="250" r="11" fill="#0e1822"/>
    <circle cx="294" cy="245" r="4.5" fill="white" opacity="0.95"/>
    <circle cx="286" cy="254" r="2" fill="white" opacity="0.3"/>

    <!-- Moon companion — on shoulder -->
    <circle cx="382" cy="152" r="50" fill="url(#moon)"/>
    <circle cx="382" cy="152" r="50" fill="url(#moon-hi)"/>

    <!-- Moon crater -->
    <circle cx="370" cy="168" r="8" fill="#3e6488" opacity="0.2"/>

    <!-- Moon eye ambient -->
    <circle cx="372" cy="146" r="14" fill="url(#eye-ambient)"/>
    <circle cx="396" cy="144" r="14" fill="url(#eye-ambient)"/>

    <!-- Moon eyes -->
    <circle cx="372" cy="146" r="8.5" fill="url(#eye-glow-l)"/>
    <circle cx="372" cy="146" r="4.2" fill="#0e1822"/>
    <circle cx="374" cy="144" r="1.8" fill="white" opacity="0.9"/>

    <circle cx="396" cy="144" r="8.5" fill="url(#eye-glow-r)"/>
    <circle cx="396" cy="144" r="4.2" fill="#0e1822"/>
    <circle cx="398" cy="142" r="1.8" fill="white" opacity="0.9"/>
  </g>
</svg>