<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 18: Simpler — no ring. Just the planet character + moon buddy.
       Bigger eyes, small bump-arms on the sides (like OpenClaw's claws).
       More compact, bolder. -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="46%" r="38%">
      <stop offset="0%" stop-color="#4a6a8e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0e1520" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="42%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#5a7ea6"/>
      <stop offset="45%" stop-color="#3e5e82"/>
      <stop offset="100%" stop-color="#2a4264"/>
    </radialGradient>
    <radialGradient id="arm" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4a6e92"/>
      <stop offset="100%" stop-color="#2a4264"/>
    </radialGradient>
    <radialGradient id="moon-g" cx="42%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#7a9abe"/>
      <stop offset="45%" stop-color="#5a7a9e"/>
      <stop offset="100%" stop-color="#3a5a7e"/>
    </radialGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8cf0d0"/>
      <stop offset="60%" stop-color="#5ad4b0"/>
      <stop offset="100%" stop-color="#3ab090"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#0e1520"/>
  <circle cx="256" cy="264" r="230" fill="url(#bg-glow)"/>

  <g id="icon">
    <!-- Legs -->
    <rect x="218" y="392" width="18" height="36" rx="9" fill="#2a4264"/>
    <rect x="276" y="392" width="18" height="36" rx="9" fill="#2a4264"/>
    <ellipse cx="227" cy="430" rx="16" ry="9" fill="#2a4264"/>
    <ellipse cx="285" cy="430" rx="16" ry="9" fill="#2a4264"/>

    <!-- Bump arms — round nubs on each side -->
    <circle cx="112" cy="274" r="36" fill="url(#arm)"/>
    <circle cx="400" cy="274" r="36" fill="url(#arm)"/>

    <!-- Body -->
    <circle cx="256" cy="264" r="144" fill="url(#body)"/>
    <!-- Subtle highlight -->
    <circle cx="222" cy="222" r="56" fill="white" opacity="0.06"/>

    <!-- Surface craters -->
    <circle cx="200" cy="326" r="18" fill="#2a4264" opacity="0.2"/>
    <circle cx="310" cy="340" r="12" fill="#2a4264" opacity="0.18"/>
    <circle cx="176" cy="360" r="8" fill="#2a4264" opacity="0.14"/>

    <!-- Eyes — big, glowing teal -->
    <circle cx="220" cy="248" r="24" fill="url(#eye-glow)"/>
    <circle cx="220" cy="248" r="12" fill="#0e1520"/>
    <circle cx="225" cy="243" r="5" fill="white" opacity="0.9"/>

    <circle cx="292" cy="246" r="24" fill="url(#eye-glow)"/>
    <circle cx="292" cy="246" r="12" fill="#0e1520"/>
    <circle cx="297" cy="241" r="5" fill="white" opacity="0.9"/>

    <!-- Moon buddy — sitting on top-right like a shoulder companion -->
    <circle cx="378" cy="148" r="52" fill="url(#moon-g)"/>
    <circle cx="366" cy="138" r="18" fill="white" opacity="0.07"/>

    <!-- Moon eyes -->
    <circle cx="366" cy="144" r="9" fill="url(#eye-glow)"/>
    <circle cx="366" cy="144" r="4.5" fill="#0e1520"/>
    <circle cx="368" cy="142" r="2" fill="white" opacity="0.9"/>

    <circle cx="392" cy="142" r="9" fill="url(#eye-glow)"/>
    <circle cx="392" cy="142" r="4.5" fill="#0e1520"/>
    <circle cx="394" cy="140" r="2" fill="white" opacity="0.9"/>
  </g>
</svg>