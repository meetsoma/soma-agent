<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 16: Faces, but with a ring around the planet.
       The ring gives it unmistakable "planet" identity even at small sizes.
       Moon peeks from behind/beside the ring. Playful. -->
  <defs>
    <radialGradient id="planet" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#9ab0cc"/>
      <stop offset="35%" stop-color="#6a82a6"/>
      <stop offset="85%" stop-color="#3a5070"/>
      <stop offset="100%" stop-color="#2e4260"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#b8c8de"/>
      <stop offset="35%" stop-color="#8ea4c0"/>
      <stop offset="100%" stop-color="#5a7494"/>
    </radialGradient>
    <radialGradient id="hi" cx="30%" cy="26%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-sm" cx="30%" cy="26%" r="28%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="76%" cy="74%" r="28%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9ab0cc" stop-opacity="0.25"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Ring — back half (behind planet) -->
    <ellipse cx="228" cy="284" rx="220" ry="56" fill="none" stroke="#6a82a6" stroke-width="14" opacity="0.25" transform="rotate(-15 228 284)"/>

    <!-- Planet -->
    <circle cx="228" cy="268" r="152" fill="url(#planet)"/>
    <circle cx="228" cy="268" r="152" fill="url(#hi)"/>
    <circle cx="228" cy="268" r="152" fill="url(#rim)"/>

    <!-- Surface -->
    <circle cx="176" cy="320" r="24" fill="#3a5070" opacity="0.12"/>
    <circle cx="280" cy="228" r="16" fill="#3a5070" opacity="0.1"/>

    <!-- Ring — front half (over planet) -->
    <!-- Using a clipped arc for the front portion -->
    <path d="M60,316 Q228,380 440,260" fill="none" stroke="#7a96b6" stroke-width="14" stroke-linecap="round" opacity="0.3" transform="rotate(-15 228 284)"/>

    <!-- Planet face -->
    <circle cx="200" cy="252" r="20" fill="#eaeff7"/>
    <circle cx="206" cy="248" r="12" fill="#7ba3c9"/>
    <circle cx="210" cy="243" r="4" fill="white"/>

    <circle cx="256" cy="248" r="20" fill="#eaeff7"/>
    <circle cx="262" cy="244" r="12" fill="#7ba3c9"/>
    <circle cx="266" cy="239" r="4" fill="white"/>

    <path d="M210,290 Q228,306 250,290" fill="none" stroke="#7ba3c9" stroke-width="5" stroke-linecap="round"/>

    <!-- Moon — upper right, peeking -->
    <circle cx="396" cy="120" r="64" fill="url(#moon)"/>
    <circle cx="396" cy="120" r="64" fill="url(#hi-sm)"/>

    <!-- Moon face -->
    <circle cx="382" cy="114" r="12" fill="#eaeff7"/>
    <circle cx="378" cy="111" r="7.5" fill="#7ba3c9"/>
    <circle cx="376" cy="108" r="2.8" fill="white"/>

    <circle cx="412" cy="112" r="12" fill="#eaeff7"/>
    <circle cx="408" cy="109" r="7.5" fill="#7ba3c9"/>
    <circle cx="406" cy="106" r="2.8" fill="white"/>

    <path d="M388,134 Q398,142 408,134" fill="none" stroke="#8aaad0" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>