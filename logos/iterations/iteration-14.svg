<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 14: Planet + Moon. Cute faces.
       Planet is large, has subtle surface texture (craters or bands).
       Moon is small, tucked upper-right, looking at planet.
       Soft blue palette. Spherical shading. -->
  <defs>
    <radialGradient id="planet" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#9ab0cc"/>
      <stop offset="35%" stop-color="#6a82a6"/>
      <stop offset="85%" stop-color="#3a5070"/>
      <stop offset="100%" stop-color="#2e4260"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#b8c8de"/>
      <stop offset="35%" stop-color="#8ea4c0"/>
      <stop offset="100%" stop-color="#5a7494"/>
    </radialGradient>
    <radialGradient id="hi" cx="30%" cy="26%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-sm" cx="30%" cy="26%" r="28%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rim" cx="76%" cy="74%" r="28%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9ab0cc" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8aaad0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8aaad0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <!-- Subtle atmosphere glow behind planet -->
    <circle cx="220" cy="276" r="190" fill="url(#glow)"/>

    <!-- Planet -->
    <circle cx="220" cy="276" r="172" fill="url(#planet)"/>
    <circle cx="220" cy="276" r="172" fill="url(#hi)"/>
    <circle cx="220" cy="276" r="172" fill="url(#rim)"/>

    <!-- Subtle surface details — soft crater-like spots -->
    <circle cx="160" cy="340" r="28" fill="#3a5070" opacity="0.15"/>
    <circle cx="280" cy="240" r="18" fill="#3a5070" opacity="0.12"/>
    <circle cx="200" cy="380" r="14" fill="#3a5070" opacity="0.1"/>

    <!-- Planet face -->
    <circle cx="190" cy="260" r="22" fill="#eaeff7"/>
    <circle cx="197" cy="256" r="13" fill="#7ba3c9"/>
    <circle cx="202" cy="250" r="4.5" fill="white"/>

    <circle cx="248" cy="256" r="22" fill="#eaeff7"/>
    <circle cx="255" cy="252" r="13" fill="#7ba3c9"/>
    <circle cx="260" cy="246" r="4.5" fill="white"/>

    <path d="M200,300 Q220,316 242,300" fill="none" stroke="#7ba3c9" stroke-width="5" stroke-linecap="round"/>

    <!-- Moon -->
    <circle cx="392" cy="128" r="72" fill="url(#moon)"/>
    <circle cx="392" cy="128" r="72" fill="url(#hi-sm)"/>

    <!-- Moon surface spots -->
    <circle cx="374" cy="148" r="10" fill="#5a7494" opacity="0.15"/>
    <circle cx="410" cy="112" r="7" fill="#5a7494" opacity="0.12"/>

    <!-- Moon face — looking toward planet -->
    <circle cx="376" cy="120" r="14" fill="#eaeff7"/>
    <circle cx="372" cy="117" r="8.5" fill="#7ba3c9"/>
    <circle cx="370" cy="114" r="3" fill="white"/>

    <circle cx="408" cy="118" r="14" fill="#eaeff7"/>
    <circle cx="404" cy="115" r="8.5" fill="#7ba3c9"/>
    <circle cx="402" cy="112" r="3" fill="white"/>

    <path d="M384,140 Q394,149 406,140" fill="none" stroke="#8aaad0" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>