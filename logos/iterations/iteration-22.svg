<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 22: Teal eyes (like OpenClaw), tighter composition.
       Moon is smaller and higher — more like a orbiting companion.
       Slightly more contrast in the body shading. No craters — cleaner. -->
  <defs>
    <radialGradient id="body" cx="40%" cy="33%" r="54%">
      <stop offset="0%" stop-color="#6892b8"/>
      <stop offset="35%" stop-color="#486e94"/>
      <stop offset="75%" stop-color="#2e4e70"/>
      <stop offset="100%" stop-color="#1e3a56"/>
    </radialGradient>
    <radialGradient id="body-hi" cx="28%" cy="24%" r="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body-rim" cx="80%" cy="78%" r="24%">
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6892b8" stop-opacity="0.18"/>
    </radialGradient>
    <radialGradient id="arm" cx="46%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#4a6e92"/>
      <stop offset="100%" stop-color="#1e3a56"/>
    </radialGradient>
    <radialGradient id="moon" cx="36%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#7eaacc"/>
      <stop offset="40%" stop-color="#5e8aac"/>
      <stop offset="100%" stop-color="#3a6486"/>
    </radialGradient>
    <radialGradient id="moon-hi" cx="30%" cy="26%" r="24%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#a8f8e0"/>
      <stop offset="35%" stop-color="#62dcc0"/>
      <stop offset="100%" stop-color="#38b89c"/>
    </radialGradient>
    <radialGradient id="eye-amb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#62dcc0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#62dcc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leg" cx="50%" cy="28%" r="56%">
      <stop offset="0%" stop-color="#3a5c7c"/>
      <stop offset="100%" stop-color="#1e3a56"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g id="icon">
    <!-- Ground shadow -->
    <ellipse cx="256" cy="460" rx="132" ry="16" fill="url(#shadow)"/>

    <!-- Legs -->
    <rect x="218" y="396" width="20" height="38" rx="10" fill="url(#leg)"/>
    <rect x="274" y="396" width="20" height="38" rx="10" fill="url(#leg)"/>
    <ellipse cx="228" cy="436" rx="16" ry="9" fill="#1e3a56"/>
    <ellipse cx="284" cy="436" rx="16" ry="9" fill="#1e3a56"/>

    <!-- Arms — slightly higher, rounder -->
    <ellipse cx="104" cy="270" rx="38" ry="34" fill="url(#arm)"/>
    <ellipse cx="408" cy="270" rx="38" ry="34" fill="url(#arm)"/>

    <!-- Body -->
    <circle cx="256" cy="268" r="150" fill="url(#body)"/>
    <circle cx="256" cy="268" r="150" fill="url(#body-hi)"/>
    <circle cx="256" cy="268" r="150" fill="url(#body-rim)"/>

    <!-- Eye ambient glow -->
    <circle cx="220" cy="252" r="36" fill="url(#eye-amb)"/>
    <circle cx="292" cy="250" r="36" fill="url(#eye-amb)"/>

    <!-- Left eye -->
    <circle cx="220" cy="252" r="24" fill="url(#eye)"/>
    <circle cx="220" cy="252" r="12" fill="#0c1620"/>
    <circle cx="225" cy="246" r="5" fill="white" opacity="0.95"/>
    <circle cx="215" cy="256" r="2.2" fill="white" opacity="0.25"/>

    <!-- Right eye -->
    <circle cx="292" cy="250" r="24" fill="url(#eye)"/>
    <circle cx="292" cy="250" r="12" fill="#0c1620"/>
    <circle cx="297" cy="244" r="5" fill="white" opacity="0.95"/>
    <circle cx="287" cy="254" r="2.2" fill="white" opacity="0.25"/>

    <!-- Moon companion -->
    <circle cx="386" cy="144" r="46" fill="url(#moon)"/>
    <circle cx="386" cy="144" r="46" fill="url(#moon-hi)"/>

    <!-- Moon eye ambient -->
    <circle cx="376" cy="138" r="12" fill="url(#eye-amb)"/>
    <circle cx="400" cy="136" r="12" fill="url(#eye-amb)"/>

    <!-- Moon eyes -->
    <circle cx="376" cy="138" r="8" fill="url(#eye)"/>
    <circle cx="376" cy="138" r="4" fill="#0c1620"/>
    <circle cx="378" cy="136" r="1.8" fill="white" opacity="0.9"/>

    <circle cx="400" cy="136" r="8" fill="url(#eye)"/>
    <circle cx="400" cy="136" r="4" fill="#0c1620"/>
    <circle cx="402" cy="134" r="1.8" fill="white" opacity="0.9"/>
  </g>
</svg>