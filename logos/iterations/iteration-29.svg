<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cycle 2A (from 27): Tighten the composition — move everything up slightly
       so there's less dead space below feet. Pupil looking slightly right
       (toward moon) for personality. Arms slightly smaller. -->
  <defs>
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6494be"/>
      <stop offset="50%" stop-color="#4e7ea6"/>
      <stop offset="100%" stop-color="#3a6890"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#78aed0"/>
      <stop offset="50%" stop-color="#6298be"/>
      <stop offset="100%" stop-color="#4c82a8"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.26"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5484aa"/>
      <stop offset="100%" stop-color="#3a6488"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#4e7ea0"/>
      <stop offset="100%" stop-color="#386a8a"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="icon">
    <ellipse cx="268" cy="478" rx="118" ry="12" fill="url(#gshd)"/>
    <rect x="214" y="412" width="22" height="36" rx="11" fill="url(#leg)"/>
    <rect x="276" y="412" width="22" height="36" rx="11" fill="url(#leg)"/>
    <ellipse cx="225" cy="450" rx="17" ry="9" fill="#386a8a"/>
    <ellipse cx="287" cy="450" rx="17" ry="9" fill="#386a8a"/>
    <!-- Smaller arms -->
    <circle cx="108" cy="280" r="32" fill="url(#arm)"/>
    <circle cx="404" cy="280" r="32" fill="url(#arm)"/>
    <!-- Body -->
    <circle cx="256" cy="276" r="148" fill="url(#body)"/>
    <circle cx="256" cy="276" r="148" fill="url(#spec)"/>
    <!-- Moon shadow -->
    <ellipse cx="348" cy="186" rx="30" ry="26" fill="url(#moon-shd)" transform="rotate(15 348 186)"/>
    <!-- Eyes — pupils shifted slightly right (looking toward moon) -->
    <circle cx="218" cy="258" r="28" fill="white"/>
    <circle cx="222" cy="256" r="14" fill="#12202e"/>
    <circle cx="228" cy="250" r="6" fill="white"/>
    <circle cx="294" cy="256" r="28" fill="white"/>
    <circle cx="298" cy="254" r="14" fill="#12202e"/>
    <circle cx="304" cy="248" r="6" fill="white"/>
    <!-- Moon -->
    <circle cx="382" cy="152" r="50" fill="url(#moon-f)"/>
    <circle cx="382" cy="152" r="50" fill="url(#moon-spec)"/>
    <!-- Moon eyes — looking at planet -->
    <circle cx="370" cy="146" r="9" fill="white"/>
    <circle cx="368" cy="144" r="4.5" fill="#12202e"/>
    <circle cx="370" cy="142" r="2" fill="white"/>
    <circle cx="396" cy="144" r="9" fill="white"/>
    <circle cx="394" cy="142" r="4.5" fill="#12202e"/>
    <circle cx="396" cy="140" r="2" fill="white"/>
  </g>
</svg>