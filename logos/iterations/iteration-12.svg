<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Iteration 12: Same concept but softer, rounder leaves.
       More gentle curves. The pat leaf droops gently onto baby.
       Slightly muted green — not neon. Warmer. -->
  <defs>
    <style>
      .stem { fill: #5c9470; }
      .leaf { fill: #5cb882; }
      .leaf-dk { fill: #48946a; }
      .soil { fill: #8a7460; }
    </style>
  </defs>
  <g id="icon">
    <!-- Soil -->
    <path class="soil" d="M32,456 Q32,428 128,420 Q220,414 280,416 Q380,414 460,422 Q496,428 496,456 L496,488 L32,488 Z"/>

    <!-- === MOM === -->
    <!-- Stem — slightly curved, organic -->
    <path class="stem" d="M168,420 Q162,340 160,260 Q158,200 160,148"
          fill="none" stroke="#5c9470" stroke-width="18" stroke-linecap="round"/>

    <!-- Lower leaves — rounder, fuller -->
    <path class="leaf" d="M155,360 Q106,330 78,290 Q68,270 86,272 Q106,276 136,314 Q154,344 155,358"/>
    <path class="leaf" d="M172,352 Q214,326 240,290 Q248,274 234,274 Q218,278 196,310 Q174,340 172,350"/>

    <!-- Upper leaves -->
    <path class="leaf" d="M156,256 Q114,228 92,192 Q84,176 100,178 Q116,182 140,216 Q156,244 156,254"/>
    <path class="leaf-dk" d="M170,250 Q204,226 224,194 Q230,180 218,180 Q204,184 188,212 Q172,238 170,248"/>

    <!-- Crown -->
    <path class="leaf" d="M158,168 Q132,134 128,98 Q126,80 142,88 Q154,96 158,140 Q160,158 158,166"/>
    <path class="leaf" d="M168,164 Q190,134 198,100 Q200,82 188,88 Q176,96 170,138 Q168,156 168,162"/>

    <!-- PAT LEAF — the key gesture. Arcs gently from mom's stem to drape over baby -->
    <path class="leaf" d="M170,218 Q220,180 290,170 Q340,164 372,172 Q392,178 388,196 Q382,212 362,206 Q332,196 288,204 Q236,220 198,242"
          opacity="0.92"/>

    <!-- The leaf tip curls down slightly — tender droop onto baby -->
    <path class="leaf" d="M378,182 Q398,178 402,194 Q404,210 386,212 Q370,210 374,194 Z"/>

    <!-- === BABY === -->
    <!-- Tiny stem -->
    <path d="M380,420 Q378,396 379,368"
          fill="none" stroke="#5c9470" stroke-width="12" stroke-linecap="round"/>

    <!-- Two little cotyledon leaves — round, soft -->
    <path class="leaf" d="M373,376 Q350,354 340,330 Q336,318 350,322 Q362,330 372,360 Q373,370 373,374"/>
    <path class="leaf" d="M385,372 Q406,352 418,330 Q422,318 410,320 Q398,328 388,358 Q386,368 385,370"/>
  </g>
</svg>