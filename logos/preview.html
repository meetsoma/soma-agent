<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soma — Logo Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; padding: 2rem; transition: background-color 0.3s, color 0.3s; }
  body.light { background: #f0f0f0; color: #333; }
  body.dark { background: #0e1520; color: #eee; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  h1 { font-size: 1.4rem; font-weight: 600; }
  .controls { display: flex; gap: 0.5rem; }
  .btn { padding: 0.4rem 0.8rem; border: 1px solid currentColor; border-radius: 6px; background: transparent; color: inherit; cursor: pointer; font-size: 0.8rem; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 820px; }
  .card { border: 2px solid rgba(128,128,128,0.15); border-radius: 12px; overflow: hidden; position: relative; transition: all 0.3s; cursor: pointer; }
  .card:hover { border-color: rgba(128,128,128,0.4); }
  .card.winner { border-color: #4ade80; }
  .card.loser { opacity: 0.4; }
  .card-img { display: flex; align-items: center; justify-content: center; padding: 1.5rem; min-height: 280px; position: relative; }
  body.light .card-img { background: #fff; }
  body.dark .card-img { background: #141e2c; }
  .card-img img { max-width: 100%; max-height: 250px; }
  .card-label { padding: 0.5rem 0.8rem; font-size: 0.78rem; border-top: 1px solid rgba(128,128,128,0.15); display: flex; justify-content: space-between; align-items: center; }
  body.light .card-label { background: #fafafa; color: #666; }
  body.dark .card-label { background: #1a2434; color: #889; }
  .who-voted { font-size: 0.7rem; opacity: 0.6; }
  .winner-badge { display: none; position: absolute; top: 12px; right: 12px; background: #4ade80; color: #052e16; font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 6px; letter-spacing: 0.05em; z-index: 10; }
  .card.winner .winner-badge { display: block; }
  .vote-hint { display: none; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 4px; pointer-events: none; }
  .card:not(.winner):not(.loser):not(.voted) :hover .vote-hint,
  .card:not(.voted):hover .vote-hint { display: block; }
  h2 { font-size: 1rem; font-weight: 500; margin: 2rem 0 0.8rem; opacity: 0.7; }
  .favicon-strip { display: flex; gap: 2.5rem; flex-wrap: wrap; align-items: end; }
  .favicon-group { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
  .favicon-sizes { display: flex; gap: 0.8rem; align-items: end; }
  .favicon-sizes > div { text-align: center; }
  .favicon-sizes .sz { font-size: 0.6rem; opacity: 0.35; margin-top: 2px; }
  .fav-label { font-size: 0.7rem; font-weight: 500; opacity: 0.5; }
  .ping { display: none; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2434; color: #eee; padding: 1.2rem 2rem; border-radius: 12px; font-size: 0.9rem; box-shadow: 0 4px 30px rgba(0,0,0,0.5); z-index: 100; text-align: center; min-width: 300px; border: 1px solid rgba(128,128,128,0.2); }
  body.light .ping { background: #fff; color: #333; box-shadow: 0 4px 30px rgba(0,0,0,0.15); }
  .ping.show { display: block; animation: slideUp 0.4s ease-out; }
  .ping .result-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.4rem; }
  .ping .result-detail { font-size: 0.8rem; opacity: 0.6; }
  .ping .result-picks { margin: 0.6rem 0; font-size: 0.85rem; }
  @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'dark';
    document.body.className = mode;
    document.querySelector('.toggle').textContent = mode === 'dark' ? '☀️ Light' : '🌙 Dark';
    render();
  });
  function toggleMode() {
    const isLight = document.body.classList.contains('light');
    document.body.className = isLight ? 'dark' : 'light';
    document.querySelector('.toggle').textContent = isLight ? '☀️ Light' : '🌙 Dark';
    const url = new URL(window.location); url.searchParams.set('mode', isLight ? 'dark' : 'light'); history.replaceState(null, '', url);
  }
  const SOMA_VOTE = "b";
  let userVoteVal = null;
  function userVote(pick) {
    userVoteVal = pick;
    document.title = 'VOTED:' + pick;
    // Ping Soma via server
    fetch('/vote', { method: 'POST', body: pick }).catch(() => {});
    render();
  }
  function render() {
    const bothVoted = SOMA_VOTE && userVoteVal;
    const agreed = bothVoted && SOMA_VOTE === userVoteVal;
    const winner = agreed ? SOMA_VOTE : null;
    document.querySelectorAll('.card').forEach(card => {
      const id = card.dataset.id;
      card.classList.remove('winner', 'loser', 'voted');
      if (userVoteVal) card.classList.add('voted');
      if (bothVoted) {
        if (agreed) { card.classList.add(id === winner ? 'winner' : 'loser'); }
        else {
          if (SOMA_VOTE !== id && userVoteVal !== id) card.classList.add('loser');
          else card.style.borderColor = SOMA_VOTE === id ? '#60b0f0' : '#f0c060';
        }
      }
      const whoEl = card.querySelector('.who-voted');
      const parts = [];
      if (SOMA_VOTE === id) parts.push('🤖');
      if (userVoteVal === id) parts.push('👤');
      whoEl.textContent = parts.join(' ');
    });
    const ping = document.getElementById('ping');
    if (bothVoted) {
      const labels = {};
      document.querySelectorAll('.card').forEach(c => {
        const id = c.dataset.id;
        labels[id] = c.querySelector('.card-label span').textContent;
      });
      const somaLabel = labels[SOMA_VOTE] || SOMA_VOTE.toUpperCase();
      const userLabel = labels[userVoteVal] || userVoteVal.toUpperCase();
      if (agreed) {
        ping.innerHTML = `<div class="result-title">✨ We agree!</div><div class="result-picks">Both picked: ${userLabel}</div><div class="result-detail">Tell Soma: "we agreed on ${userVoteVal.toUpperCase()}" to continue</div>`;
      } else {
        ping.innerHTML = `<div class="result-title">🤔 Split vote</div><div class="result-picks">👤 You: ${userLabel}<br>🤖 Soma: ${somaLabel}</div><div class="result-detail">Tell Soma: "I picked ${userVoteVal.toUpperCase()}" to discuss</div>`;
      }
      ping.classList.add('show');
    }
  }
  document.addEventListener('click', (e) => { const card = e.target.closest('.card'); if (card && !userVoteVal) userVote(card.dataset.id); });
</script>
</head>
<body class="dark">
  <div class="header">
    <h1>Cycle 5 — Vote</h1>
    <div class="controls"><button class="btn toggle" onclick="toggleMode()">☀️ Light</button></div>
  </div>
  <div class="grid">
    <div class="card" data-id="a">
      <div class="card-img"><div class="winner-badge">✓ WINNER</div><img src="iterations/iteration-35.svg" alt="A"><div class="vote-hint">Click to vote</div></div>
      <div class="card-label"><span>A (35) — Squinted eye, bigger moon eyes, smile</span><span class="who-voted"></span></div>
    </div>
    <div class="card" data-id="b">
      <div class="card-img"><div class="winner-badge">✓ WINNER</div><img src="iterations/iteration-36.svg" alt="B"><div class="vote-hint">Click to vote</div></div>
      <div class="card-label"><span>B (36) — No smile, more overlap, clean</span><span class="who-voted"></span></div>
    </div>
  </div>
  <div id="ping" class="ping"></div>
  <h2>Favicon Size Check</h2>
  <div class="favicon-strip">
    <div class="favicon-group"><div class="fav-label">A</div><div class="favicon-sizes"><div><img src="iterations/iteration-35.svg" width="64" height="64"><div class="sz">64</div></div><div><img src="iterations/iteration-35.svg" width="32" height="32"><div class="sz">32</div></div><div><img src="iterations/iteration-35.svg" width="16" height="16"><div class="sz">16</div></div></div></div>
    <div class="favicon-group"><div class="fav-label">B</div><div class="favicon-sizes"><div><img src="iterations/iteration-36.svg" width="64" height="64"><div class="sz">64</div></div><div><img src="iterations/iteration-36.svg" width="32" height="32"><div class="sz">32</div></div><div><img src="iterations/iteration-36.svg" width="16" height="16"><div class="sz">16</div></div></div></div>
  </div>
</body>
</html>
