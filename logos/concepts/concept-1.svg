<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Concept 1: "The Soma" — a small living organism
       Inspired by a tardigrade / water bear — the most resilient creature alive.
       Soma survives between sessions, carries memory, grows.
       A round, friendly body with stubby limbs reaching outward.
       One bright eye — awareness. It's alive, it sees you.
       Simple enough for 16px: round body + eye. -->
  <defs>
    <style>
      .body { fill: #1a1a2e; }
      .belly { fill: #2d3a5c; }
      .eye-white { fill: #e8f0fb; }
      .eye-iris { fill: #5b8fb9; }
      .limb { fill: #2d3a5c; stroke: #1a1a2e; stroke-width: 4; }
    </style>
  </defs>
  <g id="icon">
    <!-- Stubby limbs — reaching out, growing -->
    <!-- Bottom left -->
    <ellipse class="limb" cx="155" cy="390" rx="36" ry="28" transform="rotate(-25 155 390)"/>
    <!-- Bottom right -->
    <ellipse class="limb" cx="357" cy="390" rx="36" ry="28" transform="rotate(25 357 390)"/>
    <!-- Top left — reaching upward -->
    <ellipse class="limb" cx="140" cy="175" rx="32" ry="24" transform="rotate(-40 140 175)"/>
    <!-- Top right — reaching upward -->
    <ellipse class="limb" cx="372" cy="175" rx="32" ry="24" transform="rotate(40 372 175)"/>

    <!-- Main body — plump, round, alive -->
    <ellipse class="body" cx="256" cy="280" rx="140" ry="160"/>

    <!-- Belly highlight — subtle dimension -->
    <ellipse class="belly" cx="256" cy="300" rx="100" ry="110" opacity="0.4"/>

    <!-- Single eye — large, aware, friendly -->
    <circle class="eye-white" cx="256" cy="240" r="52"/>
    <circle class="eye-iris" cx="262" cy="236" r="30"/>
    <circle cx="270" cy="226" r="10" fill="white" opacity="0.9"/>

    <!-- Tiny mouth — subtle, content -->
    <path d="M238,310 Q256,326 274,310" fill="none" stroke="#5b8fb9" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>